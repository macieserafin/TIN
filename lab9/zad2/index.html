<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab 9 - Zadanie 2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Zadanie 2</h1>

    <div class="calculator">
        <input id="number-a" type="number" placeholder="Pierwsza liczba">
        <input id="number-b" type="number" placeholder="Druga liczba">

        <select id="operation">
            <option value="add">Dodawanie</option>
            <option value="subtract">Odejmowanie</option>
            <option value="multiply">Mnozenie</option>
            <option value="divide">Dzielenie</option>
        </select>

        <button id="calculate" type="button">Oblicz</button>
        <p id="result">Wynik:</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
